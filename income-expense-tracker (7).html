<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ບັນທຶກລາຍຮັບ-ລາຍຈ່າຍ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans Lao', sans-serif;
  background: #f0f0ea;
  color: #1a1a1a;
  min-height: 100vh;
  padding-bottom: 100px;
}

/* ===== TOP HEADER ===== */
.top-bar {
  background: #fff;
  padding: 16px 16px 12px;
  border-bottom: 1px solid #e8e8e4;
  position: sticky;
  top: 0;
  z-index: 50;
}
.top-bar-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.app-title { font-size: 18px; font-weight: 600; color: #1a1a1a; }
.month-label { font-size: 12px; color: #aaa; }
.currency-btns { display: flex; gap: 6px; }
.currency-btn {
  border: 1px solid #ddd;
  border-radius: 20px;
  padding: 4px 12px;
  font-family: 'Noto Sans Lao', sans-serif;
  font-size: 12px;
  cursor: pointer;
  color: #666;
  background: #f5f5f0;
}
.currency-btn.active {
  background: #1a1a1a;
  color: #fff;
  border-color: #1a1a1a;
  font-weight: 500;
}

/* ===== SUMMARY CARDS ===== */
.summary-wrap { padding: 14px 12px 0; }
.summary-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.summary-card {
  background: #fff;
  border-radius: 12px;
  padding: 12px 8px;
  text-align: center;
  border: 1px solid #e8e8e4;
}
.summary-label { font-size: 10px; color: #aaa; margin-bottom: 6px; }
.summary-val { font-size: 16px; font-weight: 600; }
.income-val { color: #16a34a; }
.expense-val { color: #dc2626; }
.balance-pos { color: #16a34a; }
.balance-neg { color: #dc2626; }

/* ===== ADD FORM ===== */
.form-wrap { padding: 12px 12px 0; }
.form-card {
  background: #fff;
  border-radius: 14px;
  border: 1px solid #e8e8e4;
  overflow: hidden;
}
.form-header {
  padding: 12px 14px 0;
  font-size: 13px;
  font-weight: 500;
  color: #888;
}
.form-body { padding: 10px 14px 14px; }
.field { margin-bottom: 10px; }
.field label { font-size: 11px; color: #aaa; display: block; margin-bottom: 4px; }
.field input, .field select {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid #e8e8e4;
  border-radius: 10px;
  font-family: 'Noto Sans Lao', sans-serif;
  font-size: 16px;
  color: #1a1a1a;
  background: #fafaf8;
  -webkit-appearance: none;
  appearance: none;
}
.field input:focus, .field select:focus {
  border-color: #1a1a1a;
  outline: none;
  background: #fff;
}
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 4px; }
.btn-income {
  background: #dcfce7; color: #16a34a;
  border: 1px solid #bbf7d0;
  border-radius: 10px; padding: 12px;
  font-size: 15px; font-family: 'Noto Sans Lao', sans-serif;
  cursor: pointer; font-weight: 500;
}
.btn-expense {
  background: #fee2e2; color: #dc2626;
  border: 1px solid #fecaca;
  border-radius: 10px; padding: 12px;
  font-size: 15px; font-family: 'Noto Sans Lao', sans-serif;
  cursor: pointer; font-weight: 500;
}

/* ===== DATE FILTER ===== */
.filter-wrap { padding: 12px 12px 0; }
.filter-card {
  background: #fff;
  border-radius: 14px;
  border: 1px solid #e8e8e4;
  overflow: hidden;
}
.filter-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 14px;
  cursor: pointer;
  user-select: none;
}
.filter-header-left { display: flex; align-items: center; gap: 8px; }
.filter-header-title { font-size: 13px; font-weight: 500; color: #1a1a1a; }
.filter-badge {
  font-size: 10px;
  background: #16a34a;
  color: #fff;
  padding: 2px 8px;
  border-radius: 20px;
}
.filter-arrow { font-size: 12px; color: #aaa; transition: transform 0.2s; }
.filter-arrow.open { transform: rotate(180deg); }
.filter-body { padding: 0 14px 14px; display: none; }
.filter-body.open { display: block; }
.filter-date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.filter-date-row label { font-size: 11px; color: #aaa; display: block; margin-bottom: 4px; }
.filter-date-row input {
  width: 100%; padding: 9px 10px;
  border: 1px solid #e8e8e4;
  border-radius: 10px;
  font-family: 'Noto Sans Lao', sans-serif;
  font-size: 14px;
  background: #fafaf8;
  -webkit-appearance: none;
  appearance: none;
}
.filter-action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.btn-search {
  background: #1a1a1a; color: #fff; border: none;
  border-radius: 10px; padding: 10px;
  font-family: 'Noto Sans Lao', sans-serif; font-size: 13px; cursor: pointer;
}
.btn-clear-filter {
  background: #f5f5f0; color: #888;
  border: 1px solid #e0e0e0;
  border-radius: 10px; padding: 10px;
  font-family: 'Noto Sans Lao', sans-serif; font-size: 13px; cursor: pointer;
}

/* ===== TX LIST ===== */
.tx-wrap { padding: 12px 12px 0; }
.tx-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.tx-title { font-size: 13px; font-weight: 500; color: #888; }
.type-pills { display: flex; gap: 6px; }
.type-pill {
  border: 1px solid #ddd;
  border-radius: 20px;
  padding: 4px 12px;
  font-family: 'Noto Sans Lao', sans-serif;
  font-size: 12px;
  cursor: pointer;
  color: #888;
  background: #fff;
}
.type-pill.active {
  background: #1a1a1a; color: #fff; border-color: #1a1a1a; font-weight: 500;
}
.tx-list { display: flex; flex-direction: column; gap: 8px; }
.tx-item {
  background: #fff;
  border: 1px solid #e8e8e4;
  border-radius: 12px;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.tx-icon {
  width: 38px; height: 38px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; flex-shrink: 0;
}
.tx-icon.income { background: #dcfce7; }
.tx-icon.expense { background: #fee2e2; }
.tx-info { flex: 1; min-width: 0; }
.tx-name { font-size: 14px; font-weight: 500; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tx-meta { font-size: 11px; color: #bbb; margin-top: 2px; }
.tx-amount { font-size: 15px; font-weight: 600; flex-shrink: 0; }
.tx-amount.income { color: #16a34a; }
.tx-amount.expense { color: #dc2626; }
.tx-actions { display: flex; gap: 2px; flex-shrink: 0; }
.tx-edit, .tx-del {
  background: none; border: none; cursor: pointer;
  font-size: 14px; padding: 5px 6px; border-radius: 8px; color: #ccc;
}
.tx-edit:hover { color: #6366f1; }
.tx-del:hover { color: #dc2626; }
.empty {
  text-align: center; padding: 40px 20px;
  color: #ccc; font-size: 13px;
  background: #fff; border-radius: 14px;
  border: 1px solid #e8e8e4;
}

/* ===== MODAL ===== */
.modal-overlay {
  display: none; position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.45);
  z-index: 100; align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #fff;
  border-radius: 20px 20px 0 0;
  padding: 20px 20px 36px;
  width: 100%; max-width: 480px;
  max-height: 90vh; overflow-y: auto;
}
.modal-handle {
  width: 36px; height: 4px;
  background: #e0e0e0; border-radius: 2px;
  margin: 0 auto 16px;
}
.modal-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #1a1a1a; }
.modal-field { margin-bottom: 12px; }
.modal-field label { font-size: 12px; color: #888; display: block; margin-bottom: 5px; }
.modal-field input, .modal-field select {
  width: 100%; padding: 10px 12px;
  border: 1px solid #e8e8e4; border-radius: 10px;
  font-family: 'Noto Sans Lao', sans-serif; font-size: 16px;
  background: #fafaf8; color: #1a1a1a;
  -webkit-appearance: none; appearance: none;
}
.modal-field input:focus, .modal-field select:focus {
  border-color: #1a1a1a; outline: none; background: #fff;
}
.modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
.modal-cancel {
  background: #f5f5f0; color: #555;
  border: 1px solid #ddd; border-radius: 10px; padding: 12px;
  font-family: 'Noto Sans Lao', sans-serif; font-size: 14px; cursor: pointer;
}
.modal-save {
  background: #1a1a1a; color: #fff; border: none;
  border-radius: 10px; padding: 12px;
  font-family: 'Noto Sans Lao', sans-serif; font-size: 14px; cursor: pointer;
}
.saved-badge {
  font-size: 11px; color: #16a34a;
  background: #dcfce7; padding: 3px 10px;
  border-radius: 20px; display: none;
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="top-bar-row">
    <div class="app-title">ບັນທຶກລາຍຮັບ-ລາຍຈ່າຍ</div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="saved-badge" id="saved-badge">✓ ບັນທຶກ</span>
      <span class="month-label" id="month-label"></span>
    </div>
  </div>
  <div class="currency-btns">
    <button class="currency-btn" onclick="setCurrency('₭','ກີບ',this)">₭ ກີບ</button>
    <button class="currency-btn" onclick="setCurrency('฿','ບາດ',this)">฿ ບາດ</button>
    <button class="currency-btn" onclick="setCurrency('$','ໂດລ່າ',this)">$ ໂດລ່າ</button>
  </div>
</div>

<!-- SUMMARY -->
<div class="summary-wrap">
  <div class="summary-grid">
    <div class="summary-card">
      <div class="summary-label">ລາຍຮັບທັງໝົດ</div>
      <div class="summary-val income-val" id="total-income">฿0</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">ລາຍຈ່າຍທັງໝົດ</div>
      <div class="summary-val expense-val" id="total-expense">฿0</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">ຍອດຄົງເຫຼືອ</div>
      <div class="summary-val" id="balance">฿0</div>
    </div>
  </div>
</div>

<!-- ADD FORM -->
<div class="form-wrap">
  <div class="form-card">
    <div class="form-header">ເພີ່ມລາຍການໃໝ່</div>
    <div class="form-body">
      <div class="field">
        <label>ລາຍລະອຽດ</label>
        <input type="text" id="desc" placeholder="ຊື່ລາຍການ...">
      </div>
      <div class="field-row">
        <div class="field" style="margin:0">
          <label id="amount-label">ຈຳນວນເງິນ (฿)</label>
          <input type="number" id="amount" placeholder="0" min="0">
        </div>
        <div class="field" style="margin:0">
          <label>ໝວດໝູ່</label>
          <select id="category">
            <option value="ເງິນເດືອນ">ເງິນເດືອນ</option>
            <option value="ທຸລະກິດ">ທຸລະກິດ</option>
            <option value="ບັດດອງ">ບັດດອງ</option>
            <option value="ອາຫານ">ອາຫານ</option>
            <option value="ເຄື່ອງດື່ມ">ເຄື່ອງດື່ມ</option>
            <option value="ການຂົນສົ່ງ">ການຂົນສົ່ງ</option>
            <option value="ສຸຂະພາບ">ສຸຂະພາບ</option>
            <option value="ການສຶກສາ">ການສຶກສາ</option>
            <option value="ຄ່ານ້ຳ-ໄຟ">ຄ່ານ້ຳ-ໄຟ</option>
            <option value="ບັນເທີງ">ບັນເທີງ</option>
            <option value="ເສື້ອຜ້າ">ເສື້ອຜ້າ</option>
            <option value="ເຄື່ອງໃຊ້">ເຄື່ອງໃຊ້</option>
            <option value="ອື່ນໆ">ອື່ນໆ</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field" style="margin:0">
          <label>ວັນທີ</label>
          <input type="date" id="date" style="width:100%;min-width:0">
        </div>
        <div class="field" style="margin:0">
          <label>ໝາຍເຫດ</label>
          <input type="text" id="note" placeholder="(ທາງເລືອກ)">
        </div>
      </div>
      <div class="btn-row">
        <button class="btn-income" onclick="addTransaction('income')">+ ລາຍຮັບ</button>
        <button class="btn-expense" onclick="addTransaction('expense')">− ລາຍຈ່າຍ</button>
      </div>
    </div>
  </div>
</div>

<!-- DATE FILTER (collapsible) -->
<div class="filter-wrap">
  <div class="filter-card">
    <div class="filter-header" onclick="toggleFilter()">
      <div class="filter-header-left">
        <span>📅</span>
        <span class="filter-header-title">ເລືອກຊ່ວງວັນທີ</span>
        <span class="filter-badge" id="date-badge" style="display:none">ກຳລັງກອງ</span>
      </div>
      <span class="filter-arrow" id="filter-arrow">▼</span>
    </div>
    <div class="filter-body" id="filter-body">
      <div class="filter-date-row">
        <div>
          <label>ຈາກວັນທີ</label>
          <input type="date" id="filter-from">
        </div>
        <div>
          <label>ຫາວັນທີ</label>
          <input type="date" id="filter-to">
        </div>
      </div>
      <div class="filter-action-row">
        <button class="btn-search" onclick="applyDateFilter()">🔍 ຄົ້ນຫາ</button>
        <button class="btn-clear-filter" onclick="clearDateFilter()">✕ ລ້າງ</button>
      </div>
    </div>
  </div>
</div>

<!-- TX LIST -->
<div class="tx-wrap">
  <div class="tx-header">
    <div class="tx-title">ລາຍການທຸລະກຳ</div>
    <div class="type-pills">
      <button class="type-pill active" onclick="setFilter('all',this)">ທັງໝົດ</button>
      <button class="type-pill" onclick="setFilter('income',this)">ລາຍຮັບ</button>
      <button class="type-pill" onclick="setFilter('expense',this)">ລາຍຈ່າຍ</button>
    </div>
  </div>
  <div class="tx-list" id="tx-list">
    <div class="empty">ຍັງບໍ່ມີລາຍການ</div>
  </div>
</div>

<!-- EDIT MODAL (slides up from bottom) -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">✏️ ແກ້ໄຂລາຍການ</div>
    <input type="hidden" id="edit-id">
    <div class="modal-field">
      <label>ປະເພດ</label>
      <select id="edit-type">
        <option value="income">ລາຍຮັບ</option>
        <option value="expense">ລາຍຈ່າຍ</option>
      </select>
    </div>
    <div class="modal-field">
      <label>ລາຍລະອຽດ</label>
      <input type="text" id="edit-desc">
    </div>
    <div class="modal-field">
      <label>ຈຳນວນເງິນ</label>
      <input type="number" id="edit-amount" min="0">
    </div>
    <div class="modal-field">
      <label>ໝວດໝູ່</label>
      <select id="edit-category">
        <option value="ເງິນເດືອນ">ເງິນເດືອນ</option>
        <option value="ທຸລະກິດ">ທຸລະກິດ</option>
        <option value="ບັດດອງ">ບັດດອງ</option>
        <option value="ອາຫານ">ອາຫານ</option>
        <option value="ເຄື່ອງດື່ມ">ເຄື່ອງດື່ມ</option>
        <option value="ການຂົນສົ່ງ">ການຂົນສົ່ງ</option>
        <option value="ສຸຂະພາບ">ສຸຂະພາບ</option>
        <option value="ການສຶກສາ">ການສຶກສາ</option>
        <option value="ຄ່ານ້ຳ-ໄຟ">ຄ່ານ້ຳ-ໄຟ</option>
        <option value="ບັນເທີງ">ບັນເທີງ</option>
        <option value="ເສື້ອຜ້າ">ເສື້ອຜ້າ</option>
        <option value="ເຄື່ອງໃຊ້">ເຄື່ອງໃຊ້</option>
        <option value="ອື່ນໆ">ອື່ນໆ</option>
      </select>
    </div>
    <div class="modal-field">
      <label>ວັນທີ</label>
      <input type="date" id="edit-date" style="width:100%;min-width:0">
    </div>
    <div class="modal-field">
      <label>ໝາຍເຫດ</label>
      <input type="text" id="edit-note" placeholder="(ທາງເລືອກ)">
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">ຍົກເລີກ</button>
      <button class="modal-save" onclick="saveEdit()">ບັນທຶກ</button>
    </div>
  </div>
</div>

<script>
  const catIcons = {
    'ເງິນເດືອນ':'💼','ທຸລະກິດ':'📊','ບັດດອງ':'🎴','ອາຫານ':'🍜','ເຄື່ອງດື່ມ':'🥤',
    'ການຂົນສົ່ງ':'🚗','ສຸຂະພາບ':'❤️','ການສຶກສາ':'📚',
    'ຄ່ານ້ຳ-ໄຟ':'💡','ບັນເທີງ':'🎮','ເສື້ອຜ້າ':'👕','ເຄື່ອງໃຊ້':'🧴','ອື່ນໆ':'📌'
  };
  const months = ['ມັງກອນ','ກຸມພາ','ມີນາ','ເມສາ','ພຶດສະພາ','ມິຖຸນາ','ກໍລະກົດ','ສິງຫາ','ກັນຍາ','ຕຸລາ','ພະຈິກ','ທັນວາ'];

  let txs = JSON.parse(localStorage.getItem('lao-budget-txs') || '[]');
  let filter = 'all';

  document.getElementById('date').valueAsDate = new Date();
  const now = new Date();
  document.getElementById('month-label').textContent = months[now.getMonth()] + ' ' + now.getFullYear();

  function fmt(n) { return currentSymbol + Math.round(n).toLocaleString(); }

  function save() {
    localStorage.setItem('lao-budget-txs', JSON.stringify(txs));
    const badge = document.getElementById('saved-badge');
    badge.style.display = 'inline';
    setTimeout(() => badge.style.display = 'none', 2000);
  }

  function addTransaction(type) {
    const desc = document.getElementById('desc').value.trim();
    const amount = parseFloat(document.getElementById('amount').value);
    const category = document.getElementById('category').value;
    const date = document.getElementById('date').value;
    const note = document.getElementById('note').value.trim();
    if (!desc) { document.getElementById('desc').focus(); return; }
    if (!amount || amount <= 0) { document.getElementById('amount').focus(); return; }
    txs.unshift({ id: Date.now(), type, desc, amount, category, date, note });
    document.getElementById('desc').value = '';
    document.getElementById('amount').value = '';
    document.getElementById('note').value = '';
    save();
    render();
  }

  function deleteTransaction(id) {
    txs = txs.filter(t => t.id !== id);
    save();
    render();
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.type-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  let currentSymbol = localStorage.getItem('currency-symbol') || '฿';

  // Set active button on load
  document.querySelectorAll('.currency-btn').forEach(btn => {
    if (btn.textContent.trim().startsWith(currentSymbol)) btn.classList.add('active');
    else btn.classList.remove('active');
  });

  function setCurrency(symbol, name, btn) {
    currentSymbol = symbol;
    localStorage.setItem('currency-symbol', symbol);
    document.querySelectorAll('.currency-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  let dateFrom = null;
  let dateTo = null;

  function applyDateFilter() {
    dateFrom = document.getElementById('filter-from').value;
    dateTo = document.getElementById('filter-to').value;
    if (!dateFrom && !dateTo) { clearDateFilter(); return; }
    const badge = document.getElementById('date-badge');
    badge.style.display = 'inline';
    if (dateFrom && dateTo) badge.textContent = dateFrom + ' ຫາ ' + dateTo;
    else if (dateFrom) badge.textContent = 'ຈາກ ' + dateFrom;
    else badge.textContent = 'ຫາ ' + dateTo;
    render();
  }

  function clearDateFilter() {
    dateFrom = null;
    dateTo = null;
    document.getElementById('filter-from').value = '';
    document.getElementById('filter-to').value = '';
    document.getElementById('date-badge').style.display = 'none';
    render();
  }

  function editTransaction(id) {
    const t = txs.find(x => x.id === id);
    if (!t) return;
    document.getElementById('edit-id').value = id;
    document.getElementById('edit-type').value = t.type;
    document.getElementById('edit-desc').value = t.desc;
    document.getElementById('edit-amount').value = t.amount;
    document.getElementById('edit-category').value = t.category;
    document.getElementById('edit-date').value = t.date;
    document.getElementById('edit-note').value = t.note || '';
    document.getElementById('modal-overlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
  }

  function saveEdit() {
    const id = parseInt(document.getElementById('edit-id').value);
    const desc = document.getElementById('edit-desc').value.trim();
    const amount = parseFloat(document.getElementById('edit-amount').value);
    if (!desc || !amount || amount <= 0) return;
    const idx = txs.findIndex(x => x.id === id);
    if (idx === -1) return;
    txs[idx] = {
      id,
      type: document.getElementById('edit-type').value,
      desc,
      amount,
      category: document.getElementById('edit-category').value,
      date: document.getElementById('edit-date').value,
      note: document.getElementById('edit-note').value.trim()
    };
    save();
    closeModal();
    render();
  }

  document.getElementById('modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  function render() {
    const income = txs.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
    const expense = txs.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
    const balance = income - expense;

    document.getElementById('total-income').textContent = fmt(income);
    document.getElementById('total-expense').textContent = fmt(expense);
    const balEl = document.getElementById('balance');
    balEl.textContent = fmt(Math.abs(balance));
    balEl.className = 'summary-val ' + (balance >= 0 ? 'balance-pos' : 'balance-neg');

    let filtered = filter === 'all' ? txs : txs.filter(t => t.type === filter);
    if (dateFrom) filtered = filtered.filter(t => t.date >= dateFrom);
    if (dateTo) filtered = filtered.filter(t => t.date <= dateTo);
    const list = document.getElementById('tx-list');

    if (!filtered.length) {
      list.innerHTML = '<div class="empty">ບໍ່ມີລາຍການທີ່ຕົງກັນ</div>';
      return;
    }

    list.innerHTML = filtered.map(t => {
      const icon = catIcons[t.category] || '📌';
      const d = t.date ? new Date(t.date + 'T00:00:00').toLocaleDateString('lo-LA') : '';
      return `<div class="tx-item">
        <div class="tx-icon ${t.type}">${icon}</div>
        <div class="tx-info">
          <div class="tx-name">${t.desc}</div>
          <div class="tx-meta">${t.category}${t.note ? ' · ' + t.note : ''}${d ? ' · ' + d : ''}</div>
        </div>
        <div class="tx-amount ${t.type}">${t.type === 'income' ? '+' : '−'}${fmt(t.amount)}</div>
        <button class="tx-edit" onclick="editTransaction(${t.id})">✏️</button><button class="tx-del" onclick="deleteTransaction(${t.id})">✕</button>
      </div>`;
    }).join('');
  }

  render();

  function toggleFilter() {
    const body = document.getElementById('filter-body');
    const arrow = document.getElementById('filter-arrow');
    body.classList.toggle('open');
    arrow.classList.toggle('open');
  }
</script>
</body>
</html>
